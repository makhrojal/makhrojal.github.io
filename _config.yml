title:       "Muhammad Makhrojal"
tagline:     "Thinking clearly. Living intentionally."
description: "Writing about government, business, and the examined life."
url:         "https://makhrojal.github.io"
baseurl:     ""

author:
  name:     "Muhammad Makhrojal"
  bio:      "Civil servant. Educator. Entrepreneur."
  twitter:  "makhrojal"
  email:    ""

markdown:    kramdown
highlighter: rouge
permalink:   /:title/

kramdown:
  input: GFM
  syntax_highlighter: rouge

plugins:
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-feed

twitter:
  username: makhrojal
  card:     summary_large_image

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"

sass:
  sass_dir: _scss
  style:    compressed

feed:
  path: feed.xml

exclude:
  - Gemfile
  - Gemfile.lock
  - vendor/
  - node_modules/
  - README.md
  - DEPLOYMENT.md
  - .gitignore
