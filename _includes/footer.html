<footer class="site-footer" role="contentinfo">
  <div class="container footer-inner">
    <div class="footer-left">
      <p class="footer-name">{{ site.title }}</p>
      <p class="footer-bio">{{ site.author.bio }}</p>
    </div>
    <div class="footer-right">
      <nav class="footer-nav" aria-label="Footer navigation">
        <a href="{{ '/' | relative_url }}">Writing</a>
        <a href="{{ '/about/' | relative_url }}">About</a>
        <a href="{{ '/feed.xml' | relative_url }}">RSS</a>
        {% if site.author.twitter %}
        <a href="https://twitter.com/{{ site.author.twitter }}" target="_blank" rel="noopener noreferrer">Twitter</a>
        {% endif %}
      </nav>
    </div>
  </div>
  <div class="container footer-bottom">
    <p>© {{ 'now' | date: "%Y" }} {{ site.author.name }}. All rights reserved.</p>
  </div>
</footer>
