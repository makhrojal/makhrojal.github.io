<!-- ── GLOBAL NAV — Apple.com black top bar (44px, #1d1d1f) ── -->
<div class="global-nav" role="banner" aria-label="Global navigation">
  <div class="global-nav__inner">

    <!-- Person / profile icon — left -->
    <div class="global-nav__logo">
      <a href="{{ '/' | relative_url }}" aria-label="{{ site.title }} — Home">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
      </a>
    </div>

    <!-- Primary nav links -->
    <nav class="global-nav__links" aria-label="Primary navigation">
      <a href="{{ '/' | relative_url }}"
         {% if page.url == '/' or page.layout == 'home' %}class="nav-active"{% endif %}>Terbaru</a>
      <a href="{{ '/archive/' | relative_url }}?category=Wealth"
         {% if page.url contains 'Wealth' %}class="nav-active"{% endif %}>Wealth</a>
      <a href="{{ '/archive/' | relative_url }}?category=Governance"
         {% if page.url contains 'Governance' %}class="nav-active"{% endif %}>Governance</a>
      <a href="{{ '/archive/' | relative_url }}?category=Mindset"
         {% if page.url contains 'Mindset' %}class="nav-active"{% endif %}>Mindset</a>
      <a href="{{ '/about/' | relative_url }}"
         {% if page.url == '/about/' %}class="nav-active"{% endif %}>About</a>
    </nav>

    <!-- Right: search + dark mode -->
    <div class="global-nav__actions">
      <a href="{{ '/archive/' | relative_url }}" class="global-nav__icon-btn" aria-label="Search">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </a>
      <button class="theme-toggle" id="themeToggle" aria-label="Switch to dark mode" type="button">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
             aria-hidden="true" focusable="false">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<!-- ── LOCAL NAV — frosted glass, 52px, sticky top: 44px ── -->
<nav class="local-nav" id="localNav" aria-label="Newsroom navigation">
  <div class="local-nav__inner">

    <!-- "Newsroom" brand — left, 21px weight 600 -->
    <a href="{{ '/' | relative_url }}" class="local-nav__brand">Newsroom</a>

    <!-- Tab links — Latest, Wealth, Governance -->
    <div class="local-nav__tabs" role="tablist">
      <a href="#latest"
         class="{% if page.url == '/' or page.layout == 'home' %}active{% endif %}"
         role="tab">Latest</a>
      <a href="{{ '/archive/' | relative_url }}?category=Wealth"
         role="tab">Wealth</a>
      <a href="{{ '/archive/' | relative_url }}?category=Governance"
         role="tab">Governance</a>
      <a href="{{ '/archive/' | relative_url }}?category=Mindset"
         role="tab">Mindset</a>
      <a href="#more"
         role="tab">More</a>
    </div>

    <!-- "Search Newsroom" pill — right -->
    <a href="{{ '/archive/' | relative_url }}" class="local-nav__search" aria-label="Search Newsroom">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      Search Newsroom
    </a>
  </div>
</nav>

<!-- ── Theme + Nav scripts ── -->
<script>
(function(){
  // 1. Smooth scroll to sections when clicking local nav tabs
  document.querySelectorAll('.local-nav__tabs a, .global-nav__links a').forEach(function(a){
    a.addEventListener('click', function(e){
      var href = a.getAttribute('href');
      if(href && href.startsWith('#')){
        e.preventDefault();
        var el = document.getElementById(href.slice(1));
        if(el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    });
  });

  // 2. Local nav sticky shadow on scroll
  var nav = document.getElementById('localNav');
  var tick = false;
  window.addEventListener('scroll', function(){
    if(!tick){
      requestAnimationFrame(function(){
        if(nav) nav.classList.toggle('is-scrolled', window.scrollY > 10);
        tick = false;
      });
      tick = true;
    }
  }, {passive: true});

  // 3. Theme toggle (no localStorage)
  var btn = document.getElementById('themeToggle');
  var root = document.documentElement;
  var sys = window.matchMedia('(prefers-color-scheme: dark)').matches;
  if(sys) root.setAttribute('data-theme', 'dark');

  function syncIcon(theme) {
    if(!btn) return;
    btn.setAttribute('aria-label', 'Switch to ' + (theme === 'dark' ? 'light' : 'dark') + ' mode');
    btn.innerHTML = theme === 'dark'
      ? '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>'
      : '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
  }
  var currentTheme = root.getAttribute('data-theme') || (sys ? 'dark' : 'light');
  syncIcon(currentTheme);

  if(btn) btn.addEventListener('click', function(){
    var next = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    root.setAttribute('data-theme', next);
    syncIcon(next);
  });
})();
</script>
