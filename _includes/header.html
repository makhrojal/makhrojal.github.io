<header class="site-header" role="banner">
  <div class="header-inner container">
    <a href="{{ '/' | relative_url }}" class="site-logo" aria-label="{{ site.title }} — Home">
      <svg width="28" height="28" viewBox="0 0 32 32" fill="none" aria-hidden="true" focusable="false">
        <rect x="4" y="4" width="10" height="10" fill="currentColor" />
        <rect x="18" y="4" width="10" height="10" fill="currentColor" opacity="0.35"/>
        <rect x="4" y="18" width="10" height="10" fill="currentColor" opacity="0.35"/>
        <rect x="18" y="18" width="10" height="10" fill="currentColor" />
      </svg>
      <span class="site-name">{{ site.title }}</span>
    </a>
    <div class="header-right">
      {% include nav.html %}
      <button class="theme-toggle" data-theme-toggle aria-label="Switch to dark mode" title="Toggle dark mode">
        <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <circle cx="12" cy="12" r="5"/>
          <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
        </svg>
        <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
      <button class="nav-toggle" aria-label="Open menu" aria-expanded="false" aria-controls="mobile-menu">
        <span class="hamburger-line"></span>
        <span class="hamburger-line"></span>
        <span class="hamburger-line"></span>
      </button>
    </div>
  </div>
  <div class="mobile-menu" id="mobile-menu" aria-hidden="true">
    <div class="container">{% include nav.html %}</div>
  </div>
</header>
