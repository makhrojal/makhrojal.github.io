<nav class="site-nav" aria-label="Site navigation">
  <a href="{{ '/' | relative_url }}" class="site-nav__brand">{{ site.title }}</a>
  <div class="site-nav__links">
    <a href="{{ '/archive/' | relative_url }}" {% if page.url contains 'archive' %}class="active"{% endif %}>Archive</a>
    <a href="https://x.com/makhrojal" target="_blank" rel="noopener noreferrer">Twitter</a>
    <a href="https://instagram.com/makhrojal" target="_blank" rel="noopener noreferrer">Instagram</a>
    <a href="#" class="subscribe-toggle" id="subscribe-toggle">Subscribe</a>
  </div>
</nav>

<div class="subscribe-box" id="subscribe-box" hidden>
  <form class="subscribe-form" action="{{ '/feed.xml' | relative_url }}" method="get">
    <label for="sub-email">Subscribe</label>
    <input type="email" id="sub-email" name="email" placeholder="Email" required autocapitalize="none" />
    <button type="submit">Subscribe</button>
    <a href="#" class="cancel-sub" id="cancel-sub">Cancel</a>
  </form>
</div>

<script>
(function(){
  var toggle = document.getElementById('subscribe-toggle');
  var box = document.getElementById('subscribe-box');
  var cancel = document.getElementById('cancel-sub');
  if (toggle && box) {
    toggle.addEventListener('click', function(e){
      e.preventDefault();
      box.hidden = !box.hidden;
    });
  }
  if (cancel && box) {
    cancel.addEventListener('click', function(e){
      e.preventDefault();
      box.hidden = true;
    });
  }
})();

(function () {
  if (!('IntersectionObserver' in window)) {
    document.querySelectorAll('.fade-up').forEach(function(el){ el.classList.add('is-visible'); });
    return;
  }
  var io = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) { entry.target.classList.add('is-visible'); io.unobserve(entry.target); }
    });
  }, { threshold: 0.06, rootMargin: '0px 0px -20px 0px' });
  function observe() { document.querySelectorAll('.fade-up').forEach(function(el){ io.observe(el); }); }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', observe);
  else observe();
})();
</script>
